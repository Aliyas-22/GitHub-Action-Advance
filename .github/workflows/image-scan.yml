name: image scanner
on:
    workflow_call:
jobs:
    image-scanner:
        runs-on: ubuntu-latest
        steps:
            - name: login to dockerhub
              uses: docker/login-action@v3
              with:
                  username: ${{vars.DOCKERHUB_USER22}}
                  password: ${{secrets.DOCKERHUB_TOKEN22}}

            - name: Trivy Scanner
              uses: aquasecurity/trivy-action@0.35.0
              with:
                  image-ref: ${{ vars.DOCKERHUB_USER22 }}/github-action-advanced:${{ github.sha }}
                  severity: "CRITICAL,HIGH"
                  exit-code: "1"
                  #   trivyignore: ${{ github.workspace }}/.trivyignore
